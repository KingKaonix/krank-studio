<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-small">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <!-- Phone frame right -->
  <rect x="680" y="40" width="420" height="720" rx="40" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
  <rect x="850" y="60" width="80" height="20" rx="10" fill="#111"/>
  <text x="710" y="95" font-family="sans-serif" font-size="10" fill="#888">9:41</text>
  
  <!-- Tuner display -->
  <rect x="700" y="105" width="380" height="50" rx="8" fill="#1e1e3a"/>
  <text x="720" y="135" font-family="monospace" font-size="11" fill="#22d3ee" font-weight="bold" letter-spacing="1">CHROMATIC TUNER</text>
  
  <!-- Tuning selector -->
  <rect x="700" y="170" width="380" height="40" rx="8" fill="#15152e" stroke="#333" stroke-width="1"/>
  <text x="890" y="195" text-anchor="middle" font-family="monospace" font-size="12" fill="#22d3ee">STANDARD (E A D G B E)</text>
  
  <!-- Note display -->
  <circle cx="890" cy="340" r="100" fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.3"/>
  <circle cx="890" cy="340" r="85" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.15"/>
  <text x="890" y="310" text-anchor="middle" font-family="sans-serif" font-size="80" fill="#22d3ee" filter="url(#glow)" font-weight="bold">A</text>
  <text x="890" y="370" text-anchor="middle" font-family="monospace" font-size="14" fill="#888">440.0 Hz</text>
  
  <!-- Cents needle -->
  <line x1="890" y1="340" x2="930" y2="300" stroke="#22c55e" stroke-width="3" stroke-linecap="round"/>
  <circle cx="890" cy="340" r="6" fill="#22c55e"/>
  
  <!-- Cents scale -->
  <g transform="translate(890, 450)">
    <text x="-80" y="0" font-family="monospace" font-size="10" fill="#ef4444">-50¢</text>
    <text x="60" y="0" font-family="monospace" font-size="10" fill="#ef4444">+50¢</text>
    <rect x="-60" y="-2" width="120" height="4" rx="2" fill="#333"/>
    <rect x="-20" y="-2" width="40" height="4" rx="2" fill="#22c55e"/>
    <rect x="0" y="-5" width="2" height="10" rx="1" fill="#fff"/>
  </g>
  
  <!-- String indicators -->
  <g transform="translate(700, 500)">
    <rect x="0" y="0" width="60" height="40" rx="6" fill="#1e1e3a" stroke="#22d3ee" stroke-width="1"/>
    <text x="30" y="25" text-anchor="middle" font-family="monospace" font-size="14" fill="#22d3ee" font-weight="bold">E</text>
    <rect x="68" y="0" width="60" height="40" rx="6" fill="#1e1e3a" stroke="#333" stroke-width="1"/>
    <text x="98" y="25" text-anchor="middle" font-family="monospace" font-size="14" fill="#888">A</text>
    <rect x="136" y="0" width="60" height="40" rx="6" fill="#1e1e3a" stroke="#333" stroke-width="1"/>
    <text x="166" y="25" text-anchor="middle" font-family="monospace" font-size="14" fill="#888">D</text>
    <rect x="204" y="0" width="60" height="40" rx="6" fill="#1e1e3a" stroke="#333" stroke-width="1"/>
    <text x="234" y="25" text-anchor="middle" font-family="monospace" font-size="14" fill="#888">G</text>
    <rect x="272" y="0" width="60" height="40" rx="6" fill="#1e1e3a" stroke="#333" stroke-width="1"/>
    <text x="302" y="25" text-anchor="middle" font-family="monospace" font-size="14" fill="#888">B</text>
    <rect x="340" y="0" width="60" height="40" rx="6" fill="#1e1e3a" stroke="#333" stroke-width="1"/>
    <text x="370" y="25" text-anchor="middle" font-family="monospace" font-size="14" fill="#888">E</text>
  </g>
  
  <!-- Tuning presets -->
  <text x="720" y="570" font-family="monospace" font-size="9" fill="#666" letter-spacing="1">PRESETS</text>
  <g transform="translate(700, 580)">
    <rect x="0" y="0" width="75" height="28" rx="6" fill="#15152e" stroke="#22d3ee" stroke-width="1"/>
    <text x="37" y="19" text-anchor="middle" font-family="monospace" font-size="8" fill="#22d3ee">Standard</text>
    <rect x="82" y="0" width="75" height="28" rx="6" fill="#15152e" stroke="#333" stroke-width="1"/>
    <text x="119" y="19" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">Drop D</text>
    <rect x="164" y="0" width="75" height="28" rx="6" fill="#15152e" stroke="#333" stroke-width="1"/>
    <text x="201" y="19" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">Drop C</text>
    <rect x="246" y="0" width="75" height="28" rx="6" fill="#15152e" stroke="#333" stroke-width="1"/>
    <text x="283" y="19" text-anchor="middle" font-family="monospace" font-size="8" fill="#666">Open D</text>
  </g>

  <!-- Bottom tools bar -->
  <rect x="700" y="640" width="380" height="55" rx="12" fill="#15152e" stroke="#333" stroke-width="1"/>
  <rect x="710" y="650" width="55" height="35" rx="8" fill="none"/>
  <text x="717" y="672" font-family="monospace" font-size="7" fill="#666">EFFECTS</text>
  <rect x="775" y="650" width="55" height="35" rx="8" fill="#1e1e3a"/>
  <text x="782" y="672" font-family="monospace" font-size="7" fill="#22d3ee">TUNER</text>
  <rect x="840" y="650" width="55" height="35" rx="8" fill="none"/>
  <text x="847" y="672" font-family="monospace" font-size="7" fill="#666">MATCHER</text>
  <rect x="905" y="650" width="55" height="35" rx="8" fill="none"/>
  <text x="912" y="672" font-family="monospace" font-size="7" fill="#666">TRANS</text>
  <rect x="970" y="650" width="55" height="35" rx="8" fill="none"/>
  <text x="977" y="672" font-family="monospace" font-size="7" fill="#666">TOOLS</text>

  <!-- Left side Hero content -->
  <text x="60" y="180" font-family="sans-serif" font-size="48" fill="#fff" font-weight="bold">Chromatic Tuner</text>
  <text x="60" y="230" font-family="monospace" font-size="14" fill="#22d3ee" letter-spacing="2">±1 CENT ACCURACY</text>
  
  <text x="60" y="290" font-family="sans-serif" font-size="16" fill="#aaa">
    <tspan x="60" dy="0">Strobe-style note display with real-time</tspan>
    <tspan x="60" dy="24">pitch detection and visual feedback.</tspan>
  </text>

  <g transform="translate(60, 380)">
    <rect x="0" y="0" width="480" height="60" rx="12" fill="#1e1e3a" stroke="#22d3ee" stroke-width="1"/>
    <text x="20" y="25" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold">12 Tuning Presets</text>
    <text x="20" y="45" font-family="sans-serif" font-size="12" fill="#aaa">Standard, Drop D, Drop C, Open D/G/E, DADGAD, Half-Step, Full-Step, Drop B, Open A, Custom</text>
  </g>

  <g transform="translate(60, 460)">
    <rect x="0" y="0" width="480" height="60" rx="12" fill="#1e1e3a" stroke="#22c55e" stroke-width="1"/>
    <text x="20" y="25" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold">Visual Cents Indicator</text>
    <text x="20" y="45" font-family="sans-serif" font-size="12" fill="#aaa">Color zones: green (in tune), yellow (close), red (off) — accurate to 0.1 Hz</text>
  </g>

  <g transform="translate(60, 540)">
    <rect x="0" y="0" width="480" height="60" rx="12" fill="#1e1e3a" stroke="#a855f7" stroke-width="1"/>
    <text x="20" y="25" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold">Tuner Mute Mode</text>
    <text x="20" y="45" font-family="sans-serif" font-size="12" fill="#aaa">Cuts dry signal to amp for silent tuning — no one hears you tune</text>
  </g>

  <!-- CTA -->
  <rect x="60" y="660" width="260" height="48" rx="24" fill="#7c3aed"/>
  <text x="190" y="690" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold">Download KRANK STUDIO</text>
  <text x="60" y="730" font-family="monospace" font-size="11" fill="#888">Free. No subscriptions. No IAP.</text>
</svg>
