<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="240" fill="url(#glow)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.2"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <!-- Sound wave arcs -->
  <path d="M120 280 Q160 220 200 260 Q240 300 280 260 Q320 220 360 260 Q400 300 440 280" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.15"/>
  <path d="M140 300 Q180 240 220 280 Q260 320 300 280 Q340 240 380 280 Q420 320 460 300" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.1"/>
  <!-- K monogram -->
  <text x="256" y="300" text-anchor="middle" font-family="Georgia, serif" font-size="220" font-weight="bold" fill="#ffffff" filter="url(#neon)">K</text>
  <!-- Small tagline -->
  <text x="256" y="400" text-anchor="middle" font-family="monospace" font-size="18" fill="#ffffff" opacity="0.6" letter-spacing="6">STUDIO</text>
  <!-- Bottom indicator dots -->
  <circle cx="196" cy="450" r="4" fill="#22d3ee" opacity="0.8"/>
  <circle cx="216" cy="450" r="4" fill="#22d3ee" opacity="0.6"/>
  <circle cx="236" cy="450" r="4" fill="#22d3ee" opacity="0.4"/>
  <circle cx="276" cy="450" r="4" fill="#f472b6" opacity="0.4"/>
  <circle cx="296" cy="450" r="4" fill="#f472b6" opacity="0.6"/>
  <circle cx="316" cy="450" r="4" fill="#f472b6" opacity="0.8"/>
</svg>
