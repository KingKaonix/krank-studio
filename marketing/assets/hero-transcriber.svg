<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  
  <!-- Left: Phone -->
  <rect x="60" y="40" width="420" height="720" rx="40" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
  <rect x="230" y="60" width="80" height="20" rx="10" fill="#111"/>
  <text x="90" y="95" font-family="sans-serif" font-size="10" fill="#888">9:41</text>
  <rect x="80" y="105" width="380" height="50" rx="8" fill="#1e1e3a"/>
  <text x="100" y="135" font-family="monospace" font-size="11" fill="#22d3ee" font-weight="bold" letter-spacing="1">TRANSCRIBER</text>
  
  <!-- Tablature display -->
  <rect x="80" y="170" width="380" height="50" rx="8" fill="#15152e" stroke="#333" stroke-width="1"/>
  <text x="100" y="195" font-family="monospace" font-size="10" fill="#22d3ee">Now Playing: sweet_child_o_mine.wav</text>
  <text x="100" y="210" font-family="monospace" font-size="8" fill="#666">0:23 / 4:12</text>
  
  <!-- Tab lines -->
  <g transform="translate(85, 250)">
    <line x1="0" y1="0" x2="370" y2="0" stroke="#444" stroke-width="1"/>
    <text x="-10" y="4" font-family="monospace" font-size="10" fill="#22d3ee">e|</text>
    <text x="30" y="4" font-family="monospace" font-size="12" fill="#fff">-3-----5--7--5-----3--5--7--</text>
    
    <line x1="0" y1="20" x2="370" y2="20" stroke="#444" stroke-width="1"/>
    <text x="-10" y="24" font-family="monospace" font-size="10" fill="#22d3ee">B|</text>
    <text x="30" y="24" font-family="monospace" font-size="12" fill="#fff">--5--7--------7--5--7--------</text>
    
    <line x1="0" y1="40" x2="370" y2="40" stroke="#444" stroke-width="1"/>
    <text x="-10" y="44" font-family="monospace" font-size="10" fill="#22d3ee">G|</text>
    <text x="30" y="44" font-family="monospace" font-size="12" fill="#fff">--4--6--7--6--4--4--6--7--6--</text>
    
    <line x1="0" y1="60" x2="370" y2="60" stroke="#444" stroke-width="1"/>
    <text x="-10" y="64" font-family="monospace" font-size="10" fill="#22d3ee">D|</text>
    <text x="30" y="64" font-family="monospace" font-size="12" fill="#fff">-5-----7-----5--5-----7-----5</text>
    
    <line x1="0" y1="80" x2="370" y2="80" stroke="#444" stroke-width="1"/>
    <text x="-10" y="84" font-family="monospace" font-size="10" fill="#22d3ee">A|</text>
    <text x="30" y="84" font-family="monospace" font-size="12" fill="#fff">--5--7--8--7--5--5--7--8--7--</text>
    
    <line x1="0" y1="100" x2="370" y2="100" stroke="#444" stroke-width="1"/>
    <text x="-10" y="104" font-family="monospace" font-size="10" fill="#22d3ee">E|</text>
    <text x="30" y="104" font-family="monospace" font-size="12" fill="#fff">-3-----5-----3--3-----5-----3</text>
  </g>
  
  <!-- Play controls -->
  <rect x="80" y="400" width="380" height="45" rx="10" fill="#15152e" stroke="#333" stroke-width="1"/>
  <circle cx="115" cy="422" r="12" fill="#22d3ee"/>
  <polygon points="111,416 111,428 121,422" fill="#fff"/>
  <rect x="140" y="415" width="2" height="14" rx="1" fill="#666"/>
  <rect x="148" y="415" width="2" height="14" rx="1" fill="#666"/>
  <rect x="170" y="415" width="2" height="14" rx="1" fill="#666"/>
  <rect x="178" y="415" width="2" height="14" rx="1" fill="#666"/>
  <rect x="220" y="418" width="200" height="4" rx="2" fill="#333"/>
  <rect x="220" y="418" width="80" height="4" rx="2" fill="#22d3ee"/>
  <circle cx="300" cy="420" r="5" fill="#22d3ee"/>
  
  <!-- Export buttons -->
  <text x="100" y="480" font-family="monospace" font-size="10" fill="#22d3ee" letter-spacing="1">EXPORT TAB</text>
  <g transform="translate(80, 495)">
    <rect x="0" y="0" width="120" height="36" rx="8" fill="#1e1e3a" stroke="#333" stroke-width="1"/>
    <text x="60" y="23" text-anchor="middle" font-family="monospace" font-size="10" fill="#ccc">MIDI (.mid)</text>
    <rect x="130" y="0" width="120" height="36" rx="8" fill="#1e1e3a" stroke="#333" stroke-width="1"/>
    <text x="190" y="23" text-anchor="middle" font-family="monospace" font-size="10" fill="#ccc">MusicXML</text>
    <rect x="260" y="0" width="120" height="36" rx="8" fill="#1e1e3a" stroke="#333" stroke-width="1"/>
    <text x="320" y="23" text-anchor="middle" font-family="monospace" font-size="10" fill="#ccc">ABC</text>
  </g>

  <!-- Import tab button -->
  <rect x="80" y="550" width="380" height="40" rx="8" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="4,4"/>
  <text x="270" y="575" text-anchor="middle" font-family="monospace" font-size="11" fill="#22d3ee">+ OPEN MIDI / MUSICXML TAB</text>

  <!-- Bottom nav -->
  <rect x="80" y="680" width="380" height="55" rx="12" fill="#15152e" stroke="#333" stroke-width="1"/>
  <rect x="90" y="690" width="70" height="35" rx="8" fill="none"/>
  <text x="100" y="712" font-family="monospace" font-size="8" fill="#666">EFFECTS</text>
  <rect x="170" y="690" width="70" height="35" rx="8" fill="none"/>
  <text x="180" y="712" font-family="monospace" font-size="8" fill="#666">TUNER</text>
  <rect x="250" y="690" width="70" height="35" rx="8" fill="none"/>
  <text x="255" y="712" font-family="monospace" font-size="8" fill="#666">MATCHER</text>
  <rect x="330" y="690" width="70" height="35" rx="8" fill="#1e1e3a"/>
  <text x="340" y="712" font-family="monospace" font-size="8" fill="#22d3ee">TRANS</text>
  <rect x="410" y="690" width="35" height="35" rx="8" fill="none"/>
  <text x="415" y="712" font-family="monospace" font-size="8" fill="#666">...</text>

  <!-- Right: Hero content -->
  <text x="560" y="180" font-family="sans-serif" font-size="48" fill="#fff" font-weight="bold">Audio to Tablature</text>
  <text x="560" y="230" font-family="monospace" font-size="14" fill="#22d3ee" letter-spacing="2">YIN PITCH DETECTION ENGINE</text>
  
  <text x="560" y="290" font-family="sans-serif" font-size="16" fill="#aaa">
    <tspan x="560" dy="0">Load any guitar track — KRANK transcribes</tspan>
    <tspan x="560" dy="24">audio into standard tablature with fret</tspan>
    <tspan x="560" dy="24">positions, string assignments, and timing.</tspan>
  </text>

  <g transform="translate(560, 380)">
    <rect x="0" y="0" width="280" height="80" rx="12" fill="#1e1e3a" stroke="#ef4444" stroke-width="1"/>
    <text x="16" y="24" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold">Import Tab Files</text>
    <text x="16" y="46" font-family="sans-serif" font-size="12" fill="#aaa">MIDI (.mid) and MusicXML (.xml)</text>
    <text x="16" y="64" font-family="sans-serif" font-size="12" fill="#aaa">with backing audio playback</text>
  </g>
  <g transform="translate(860, 380)">
    <rect x="0" y="0" width="280" height="80" rx="12" fill="#1e1e3a" stroke="#22c55e" stroke-width="1"/>
    <text x="16" y="24" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold">Export Formats</text>
    <text x="16" y="46" font-family="sans-serif" font-size="12" fill="#aaa">MIDI, MusicXML, ABC notation</text>
    <text x="16" y="64" font-family="sans-serif" font-size="12" fill="#aaa">Guitar Pro / MuseScore / DAW compatible</text>
  </g>

  <g transform="translate(560, 480)">
    <rect x="0" y="0" width="280" height="80" rx="12" fill="#1e1e3a" stroke="#a855f7" stroke-width="1"/>
    <text x="16" y="24" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold">Polyphonic Mode</text>
    <text x="16" y="46" font-family="sans-serif" font-size="12" fill="#aaa">ML source separation for</text>
    <text x="16" y="64" font-family="sans-serif" font-size="12" fill="#aaa">multi-string transcription</text>
  </g>
  <g transform="translate(860, 480)">
    <rect x="0" y="0" width="280" height="80" rx="12" fill="#1e1e3a" stroke="#f59e0b" stroke-width="1"/>
    <text x="16" y="24" font-family="sans-serif" font-size="14" fill="#fff" font-weight="bold">Playback Engine</text>
    <text x="16" y="46" font-family="sans-serif" font-size="12" fill="#aaa">Synced tab + audio with</text>
    <text x="16" y="64" font-family="sans-serif" font-size="12" fill="#aaa">scrollable fretboard view</text>
  </g>

  <rect x="560" y="620" width="260" height="48" rx="24" fill="#7c3aed"/>
  <text x="690" y="650" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold">Download KRANK STUDIO</text>
  <text x="560" y="680" font-family="monospace" font-size="11" fill="#888">Free. No subscriptions. No IAP.</text>
</svg>
