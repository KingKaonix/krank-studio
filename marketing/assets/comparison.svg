    <rect x="410" y="210" width="390" height="36" rx="4" fill="#ef4444" opacity="0.15"/>
    <text x="426" y="233" fill="#ef4444">✗</text>
    <text x="446" y="233" fill="#666">No cab simulation</text>

    <rect x="0" y="252" width="390" height="36" rx="4" fill="#22c55e" opacity="0.15"/>
    <text x="16" y="275" fill="#22c55e">✓</text>
    <text x="36" y="275" fill="#ccc">Looper pedal</text>
    <rect x="410" y="252" width="390" height="36" rx="4" fill="#ef4444" opacity="0.15"/>
    <text x="426" y="275" fill="#ef4444">✗</text>
    <text x="446" y="275" fill="#666">No looper</text>

    <rect x="0" y="294" width="390" height="36" rx="4" fill="#22c55e" opacity="0.15"/>
    <text x="16" y="317" fill="#22c55e">✓</text>
    <text x="36" y="317" fill="#ccc">Metronome with tap tempo</text>
    <rect x="410" y="294" width="390" height="36" rx="4" fill="#ef4444" opacity="0.15"/>
    <text x="426" y="317" fill="#ef4444">✗</text>
    <text x="446" y="317" fill="#666">No metronome</text>

    <rect x="0" y="336" width="390" height="36" rx="4" fill="#22c55e" opacity="0.15"/>
    <text x="16" y="359" fill="#22c55e">✓</text>
    <text x="36" y="359" fill="#ccc">MIDI footswitch support</text>
    <rect x="410" y="336" width="390" height="36" rx="4" fill="#ef4444" opacity="0.15"/>
    <text x="426" y="359" fill="#ef4444">✗</text>
    <text x="446" y="359" fill="#666">No MIDI hardware support</text>

    <rect x="0" y="378" width="390" height="36" rx="4" fill="#22c55e" opacity="0.15"/>
    <text x="16" y="401" fill="#22c55e">✓</text>
    <text x="36" y="401" fill="#ccc">BLE foot controller</text>
    <rect x="410" y="378" width="390" height="36" rx="4" fill="#ef4444" opacity="0.15"/>
    <text x="426" y="401" fill="#ef4444">✗</text>
    <text x="446" y="401" fill="#666">No wireless control</text>

    <rect x="0" y="420" width="390" height="36" rx="4" fill="#22c55e" opacity="0.15"/>
