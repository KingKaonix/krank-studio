    <rect x="410" y="420" width="390" height="36" rx="4" fill="#ef4444" opacity="0.15"/>
    <text x="426" y="443" fill="#ef4444">✗</text>
    <text x="446" y="443" fill="#666">No audio recording</text>

    <rect x="0" y="462" width="390" height="36" rx="4" fill="#22c55e" opacity="0.15"/>
    <text x="16" y="485" fill="#22c55e">✓</text>
    <text x="36" y="485" fill="#ccc">Free</text>
    <rect x="410" y="462" width="390" height="36" rx="4" fill="#ef4444" opacity="0.15"/>
    <text x="426" y="485" fill="#ef4444">✗</text>
    <text x="446" y="485" fill="#666">$12.99/month subscription</text>
