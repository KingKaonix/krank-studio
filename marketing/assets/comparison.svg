  <!-- Bottom CTA -->
  <rect x="250" y="640" width="400" height="44" rx="22" fill="#7c3aed"/>
  <text x="450" y="668" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold">Download KRANK STUDIO — Free</text>
