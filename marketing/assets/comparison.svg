    <text x="446" y="23" fill="#666">No real-time effects</text>

    <rect x="0" y="42" width="390" height="36" rx="4" fill="#22c55e" opacity="0.15"/>
    <text x="16" y="65" fill="#22c55e">✓</text>
    <text x="36" y="65" fill="#ccc">Chromatic tuner (12 presets)</text>
    <rect x="410" y="42" width="390" height="36" rx="4" fill="#eab308" opacity="0.15"/>
    <text x="426" y="65" fill="#eab308">⚠</text>
    <text x="446" y="65" fill="#666">Basic tuner only</text>

    <rect x="0" y="84" width="390" height="36" rx="4" fill="#22c55e" opacity="0.15"/>
    <text x="16" y="107" fill="#22c55e">✓</text>
