    <rect x="410" y="84" width="390" height="36" rx="4" fill="#ef4444" opacity="0.15"/>
    <text x="426" y="107" fill="#ef4444">✗</text>
    <text x="446" y="107" fill="#666">No audio transcription</text>

    <rect x="0" y="126" width="390" height="36" rx="4" fill="#22c55e" opacity="0.15"/>
    <text x="16" y="149" fill="#22c55e">✓</text>
    <text x="36" y="149" fill="#ccc">Tab import (MIDI + MusicXML)</text>
    <rect x="410" y="126" width="390" height="36" rx="4" fill="#eab308" opacity="0.15"/>
    <text x="426" y="149" fill="#eab308">⚠</text>
    <text x="446" y="149" fill="#666">Own format only</text>

    <rect x="0" y="168" width="390" height="36" rx="4" fill="#22c55e" opacity="0.15"/>
    <text x="16" y="191" fill="#22c55e">✓</text>
