    <rect x="410" y="168" width="390" height="36" rx="4" fill="#22c55e" opacity="0.15"/>
    <text x="426" y="191" fill="#22c55e">✓</text>
    <text x="446" y="191" fill="#ccc">GP format export</text>

    <rect x="0" y="210" width="390" height="36" rx="4" fill="#22c55e" opacity="0.15"/>
