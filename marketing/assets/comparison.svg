    <rect x="0" y="0" width="390" height="36" rx="4" fill="#22c55e" opacity="0.15"/>
    <text x="16" y="23" fill="#22c55e">✓</text>
    <text x="36" y="23" fill="#ccc">Live 8-effects processing</text>
    <rect x="410" y="0" width="390" height="36" rx="4" fill="#ef4444" opacity="0.15"/>
