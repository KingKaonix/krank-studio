<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e3a;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#15152e;stop-opacity:0.95"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>
  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="700" x2="1200" y2="700" stroke="#fff" stroke-width="0.5"/>
  </g>
  <!-- Phone frame -->
  <rect x="60" y="40" width="420" height="720" rx="40" fill="#1a1a2e" stroke="#333" stroke-width="2"/>
  <!-- Phone notch -->
  <rect x="230" y="60" width="80" height="20" rx="10" fill="#111"/>
  <!-- Status bar -->
  <text x="90" y="95" font-family="sans-serif" font-size="10" fill="#888">9:41</text>
  <circle cx="420" cy="92" r="4" fill="#22d3ee" opacity="0.8"/>
  <rect x="430" y="89" width="18" height="6" rx="2" fill="#22d3ee" opacity="0.5"/>
  <!-- App header -->
  <rect x="80" y="105" width="380" height="50" rx="8" fill="#1e1e3a"/>
  <text x="100" y="135" font-family="monospace" font-size="11" fill="#22d3ee" font-weight="bold" letter-spacing="1">KRANK STUDIO</text>
  <!-- VU Meter -->
  <rect x="280" y="115" width="160" height="30" rx="4" fill="#0a0a1a"/>
  <rect x="285" y="120" width="30" height="20" rx="2" fill="#22c55e" opacity="0.9"/>
  <rect x="318" y="120" width="30" height="20" rx="2" fill="#22c55e" opacity="0.7"/>
  <rect x="351" y="120" width="30" height="20" rx="2" fill="#eab308" opacity="0.6"/>
  <rect x="384" y="120" width="30" height="20" rx="2" fill="#ef4444" opacity="0.3"/>
  <!-- Effect Cards -->
  <!-- Distortion -->
  <rect x="80" y="170" width="380" height="60" rx="10" fill="url(#card1)" stroke="#ef4444" stroke-width="1.5"/>
  <circle cx="100" cy="200" r="6" fill="#ef4444" filter="url(#glow)"/>
  <text x="115" y="204" font-family="monospace" font-size="12" fill="#fff" font-weight="bold">DISTORTION</text>
  <text x="115" y="218" font-family="monospace" font-size="9" fill="#888">Drive + Tone + Level</text>
  <!-- Slider -->
  <rect x="260" y="195" width="180" height="4" rx="2" fill="#333"/>
  <rect x="260" y="195" width="100" height="4" rx="2" fill="#ef4444"/>
  <circle cx="360" cy="197" r="6" fill="#ef4444"/>
  <text x="450" y="201" font-family="monospace" font-size="10" fill="#ef4444">ON</text>
  
  <!-- Amp Sim -->
  <rect x="80" y="238" width="380" height="60" rx="10" fill="url(#card1)" stroke="#14b8a6" stroke-width="1.5"/>
  <circle cx="100" cy="268" r="6" fill="#14b8a6" filter="url(#glow)"/>
  <text x="115" y="272" font-family="monospace" font-size="12" fill="#fff" font-weight="bold">AMP SIM</text>
  <text x="115" y="286" font-family="monospace" font-size="9" fill="#888">Drive + Tone + Level</text>
  <rect x="260" y="263" width="180" height="4" rx="2" fill="#333"/>
  <rect x="260" y="263" width="140" height="4" rx="2" fill="#14b8a6"/>
  <circle cx="400" cy="265" r="6" fill="#14b8a6"/>
  <text x="450" y="269" font-family="monospace" font-size="10" fill="#14b8a6">ON</text>
  
  <!-- EQ -->
  <rect x="80" y="306" width="380" height="60" rx="10" fill="url(#card1)" stroke="#3b82f6" stroke-width="1.5"/>
  <circle cx="100" cy="336" r="6" fill="#3b82f6" filter="url(#glow)"/>
  <text x="115" y="340" font-family="monospace" font-size="12" fill="#fff" font-weight="bold">EQ</text>
  <text x="115" y="354" font-family="monospace" font-size="9" fill="#888">Bass + Mid + Treble</text>
  <rect x="260" y="331" width="180" height="4" rx="2" fill="#333"/>
  <rect x="320" y="331" width="80" height="4" rx="2" fill="#3b82f6"/>
  <circle cx="360" cy="333" r="6" fill="#3b82f6"/>
  <text x="450" y="337" font-family="monospace" font-size="10" fill="#3b82f6">ON</text>

  <!-- Chorus -->
  <rect x="80" y="374" width="380" height="60" rx="10" fill="url(#card1)" stroke="#84cc16" stroke-width="1.5"/>
  <circle cx="100" cy="404" r="6" fill="#84cc16" filter="url(#glow)"/>
  <text x="115" y="408" font-family="monospace" font-size="12" fill="#fff" font-weight="bold">CHORUS</text>
  <text x="115" y="422" font-family="monospace" font-size="9" fill="#888">Rate + Depth + Mix</text>
  <rect x="260" y="399" width="180" height="4" rx="2" fill="#333"/>
  <rect x="260" y="399" width="60" height="4" rx="2" fill="#84cc16"/>
  <circle cx="320" cy="401" r="6" fill="#84cc16"/>
  <text x="450" y="405" font-family="monospace" font-size="10" fill="#666">OFF</text>

  <!-- Noise Gate -->
  <rect x="80" y="442" width="380" height="60" rx="10" fill="url(#card1)" stroke="#a855f7" stroke-width="1.5"/>
  <circle cx="100" cy="472" r="6" fill="#a855f7" filter="url(#glow)"/>
  <text x="115" y="476" font-family="monospace" font-size="12" fill="#fff" font-weight="bold">NOISE GATE</text>
  <text x="115" y="490" font-family="monospace" font-size="9" fill="#888">Threshold + Attack + Release</text>
  <rect x="260" y="467" width="180" height="4" rx="2" fill="#333"/>
  <rect x="260" y="467" width="120" height="4" rx="2" fill="#a855f7"/>
  <circle cx="380" cy="469" r="6" fill="#a855f7"/>
  <text x="450" y="473" font-family="monospace" font-size="10" fill="#a855f7">ON</text>

  <!-- Compressor -->
  <rect x="80" y="510" width="380" height="60" rx="10" fill="url(#card1)" stroke="#ec4899" stroke-width="1.5"/>
  <circle cx="100" cy="540" r="6" fill="#ec4899" filter="url(#glow)"/>
  <text x="115" y="544" font-family="monospace" font-size="12" fill="#fff" font-weight="bold">COMPRESSOR</text>
  <text x="115" y="558" font-family="monospace" font-size="9" fill="#888">Threshold + Ratio + Attack + Release</text>
  <rect x="260" y="535" width="180" height="4" rx="2" fill="#333"/>
  <rect x="300" y="535" width="100" height="4" rx="2" fill="#ec4899"/>
  <circle cx="400" cy="537" r="6" fill="#ec4899"/>
  <text x="450" y="541" font-family="monospace" font-size="10" fill="#ec4899">ON</text>

  <!-- Bottom nav -->
  <rect x="80" y="680" width="380" height="55" rx="12" fill="#15152e" stroke="#333" stroke-width="1"/>
  <rect x="90" y="690" width="70" height="35" rx="8" fill="#1e1e3a"/>
  <text x="100" y="712" font-family="monospace" font-size="8" fill="#22d3ee">EFFECTS</text>
  <rect x="170" y="690" width="70" height="35" rx="8" fill="none"/>
  <text x="180" y="712" font-family="monospace" font-size="8" fill="#666">TUNER</text>
  <rect x="250" y="690" width="70" height="35" rx="8" fill="none"/>
  <text x="255" y="712" font-family="monospace" font-size="8" fill="#666">MATCHER</text>
  <rect x="330" y="690" width="70" height="35" rx="8" fill="none"/>
  <text x="335" y="712" font-family="monospace" font-size="8" fill="#666">TRANS</text>
  <rect x="410" y="690" width="35" height="35" rx="8" fill="none"/>
  <text x="415" y="712" font-family="monospace" font-size="8" fill="#666">...</text>

  <!-- Right side: Hero text -->
  <text x="560" y="180" font-family="sans-serif" font-size="48" fill="#fff" font-weight="bold">8 Studio Effects</text>
  <text x="560" y="220" font-family="sans-serif" font-size="48" fill="#fff" font-weight="bold">Real-Time Processing</text>
  <text x="560" y="260" font-family="monospace" font-size="14" fill="#22d3ee" letter-spacing="2">LOW LATENCY AUDIO ENGINE</text>
  
  <text x="560" y="320" font-family="sans-serif" font-size="16" fill="#aaa" line-height="1.6">
    <tspan x="560" dy="0">Distortion, Amp Sim, EQ, Chorus, Noise Gate,</tspan>
    <tspan x="560" dy="24">Compressor, Delay, and Reverb — each with</tspan>
    <tspan x="560" dy="24">independent bypass and precision control.</tspan>
  </text>

  <!-- Feature pills -->
  <rect x="560" y="400" width="140" height="32" rx="16" fill="#1e1e3a" stroke="#22d3ee" stroke-width="1"/>
  <text x="630" y="420" text-anchor="middle" font-family="monospace" font-size="11" fill="#22d3ee">&lt; 10ms Latency</text>
  <rect x="715" y="400" width="140" height="32" rx="16" fill="#1e1e3a" stroke="#a855f7" stroke-width="1"/>
  <text x="785" y="420" text-anchor="middle" font-family="monospace" font-size="11" fill="#a855f7">48kHz / 32-bit Float</text>
  <rect x="870" y="400" width="140" height="32" rx="16" fill="#1e1e3a" stroke="#ec4899" stroke-width="1"/>
  <text x="940" y="420" text-anchor="middle" font-family="monospace" font-size="11" fill="#ec4899">IR Cab Sim</text>

  <!-- Feature list -->
  <g transform="translate(560, 470)">
    <circle cx="0" cy="0" r="4" fill="#22d3ee"/>
    <text x="16" y="4" font-family="sans-serif" font-size="14" fill="#ccc">Convolution reverb with IR loading</text>
    <circle cx="0" cy="30" r="4" fill="#22d3ee"/>
    <text x="16" y="34" font-family="sans-serif" font-size="14" fill="#ccc">Full-duplex input/output monitoring</text>
    <circle cx="0" cy="60" r="4" fill="#22d3ee"/>
    <text x="16" y="64" font-family="sans-serif" font-size="14" fill="#ccc">5 amp presets: Clean → Crunch → Lead → Metal → Ambient</text>
    <circle cx="0" cy="90" r="4" fill="#22d3ee"/>
    <text x="16" y="94" font-family="sans-serif" font-size="14" fill="#ccc">MIDI footswitch support with learn mode</text>
    <circle cx="0" cy="120" r="4" fill="#22d3ee"/>
    <text x="16" y="124" font-family="sans-serif" font-size="14" fill="#ccc">Bluetooth LE foot controller</text>
  </g>

  <!-- CTA button -->
  <rect x="560" y="640" width="260" height="48" rx="24" fill="#7c3aed"/>
  <text x="690" y="670" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#fff" font-weight="bold">Download KRANK STUDIO</text>
  <text x="690" y="700" text-anchor="middle" font-family="monospace" font-size="11" fill="#888">Free. No subscriptions.</text>
</svg>
