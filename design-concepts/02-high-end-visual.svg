<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c1a"/>
      <stop offset="100%" style="stop-color:#090912"/>
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.06)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.02)"/>
    </linearGradient>
    <linearGradient id="glow-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:rgba(34,211,238,0)"/>
      <stop offset="50%" style="stop-color:rgba(34,211,238,0.08)"/>
      <stop offset="100%" style="stop-color:rgba(34,211,238,0)"/>
    </linearGradient>
    <filter id="blur-lg">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="shadow-glow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="rgba(34,211,238,0.15)"/>
    </filter>
  </defs>
  
  <!-- Phone body -->
  <rect x="20" y="20" width="560" height="1160" rx="48" fill="#06060d"/>
  <rect x="35" y="35" width="530" height="1130" rx="40" fill="#080812"/>
  
  <!-- Ambient glow -->
  <circle cx="300" cy="200" r="200" fill="rgba(124,58,237,0.06)" filter="url(#blur-lg)"/>
  <circle cx="300" cy="600" r="150" fill="rgba(34,211,238,0.04)" filter="url(#blur-lg)"/>
  
  <!-- Status bar -->
  <text x="50" y="68" font-family="'Plus Jakarta Sans',sans-serif" font-size="12" fill="#ffffff" opacity="0.9" font-weight="600">9:41</text>
  <rect x="470" y="60" width="80" height="12" rx="6" fill="#1a1a2e"/>
  <rect x="474" y="64" width="40" height="4" rx="2" fill="#22d3ee"/>
  <circle cx="530" cy="66" r="4" fill="#22d3ee" opacity="0.6"/>
  
  <!-- App header -->
  <rect x="35" y="95" width="530" height="70" fill="url(#glass)" rx="20" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <text x="65" y="140" font-family="'Plus Jakarta Sans',sans-serif" font-size="20" fill="#ffffff" font-weight="600" letter-spacing="-0.5">KRANK Studio</text>
  <text x="505" y="140" text-anchor="end" font-family="'Plus Jakarta Sans',sans-serif" font-size="11" fill="rgba(255,255,255,0.4)">Live</text>
  <circle cx="517" cy="133" r="4" fill="#22c55e"/>
  
  <!-- VU Meter -->
  <rect x="35" y="180" width="530" height="50" rx="16" fill="url(#glass)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <text x="60" y="208" font-family="'Plus Jakarta Sans',sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" letter-spacing="1">INPUT</text>
  <g transform="translate(130, 186)">
    <rect x="0" y="6" width="180" height="24" rx="12" fill="#0a0a1a"/>
    <rect x="2" y="8" width="24" height="20" rx="10" fill="#22c55e" opacity="0.9"/>
    <rect x="28" y="8" width="24" height="20" rx="10" fill="#22c55e" opacity="0.7"/>
    <rect x="54" y="8" width="24" height="20" rx="10" fill="#22c55e" opacity="0.5"/>
    <rect x="80" y="8" width="24" height="20" rx="10" fill="#eab308" opacity="0.5"/>
    <rect x="106" y="8" width="24" height="20" rx="10" fill="#eab308" opacity="0.3"/>
    <rect x="132" y="8" width="24" height="20" rx="10" fill="#ef4444" opacity="0.15"/>
    <rect x="158" y="8" width="20" height="20" rx="10" fill="#ef4444" opacity="0.08"/>
  </g>
  <text x="470" y="208" font-family="'Plus Jakarta Sans',sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">-8.2 dB</text>
  
  <!-- Effect cards - glassmorphism -->
  <g transform="translate(35, 245)">
    <!-- Distortion -->
    <rect x="0" y="0" width="530" height="70" rx="16" fill="url(#glass)" stroke="rgba(239,68,68,0.15)" stroke-width="0.5" filter="url(#shadow-glow)"/>
    <rect x="0" y="0" width="3" height="70" rx="1.5" fill="#ef4444"/>
    <circle cx="25" cy="20" r="4" fill="#ef4444"/>
    <text x="37" y="24" font-family="'Plus Jakarta Sans',sans-serif" font-size="14" fill="#ffffff" font-weight="600">Distortion</text>
    <text x="37" y="42" font-family="'Plus Jakarta Sans',sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">Drive · Tone · Level</text>
    <g transform="translate(280, 20)">
      <rect x="0" y="0" width="160" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
      <rect x="0" y="0" width="100" height="4" rx="2" fill="#ef4444"/>
      <circle cx="100" cy="2" r="5" fill="#ef4444" stroke="#0c0c1a" stroke-width="2"/>
    </g>
    <text x="490" y="40" text-anchor="end" font-family="'Plus Jakarta Sans',sans-serif" font-size="10" fill="rgba(239,68,68,0.8)">ON</text>
    
    <!-- Amp Sim -->
    <rect x="0" y="82" width="530" height="70" rx="16" fill="url(#glass)" stroke="rgba(20,184,166,0.15)" stroke-width="0.5"/>
    <rect x="0" y="82" width="3" height="70" rx="1.5" fill="#14b8a6"/>
    <circle cx="25" cy="102" r="4" fill="#14b8a6"/>
    <text x="37" y="106" font-family="'Plus Jakarta Sans',sans-serif" font-size="14" fill="#ffffff" font-weight="600">Amp Sim</text>
    <text x="37" y="124" font-family="'Plus Jakarta Sans',sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">Drive · Tone · Level</text>
    <g transform="translate(280, 102)">
      <rect x="0" y="0" width="160" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
      <rect x="0" y="0" width="130" height="4" rx="2" fill="#14b8a6"/>
      <circle cx="130" cy="2" r="5" fill="#14b8a6" stroke="#0c0c1a" stroke-width="2"/>
    </g>
    <text x="490" y="122" text-anchor="end" font-family="'Plus Jakarta Sans',sans-serif" font-size="10" fill="rgba(20,184,166,0.8)">ON</text>
    
    <!-- EQ -->
    <rect x="0" y="164" width="530" height="70" rx="16" fill="url(#glass)" stroke="rgba(59,130,246,0.15)" stroke-width="0.5"/>
    <rect x="0" y="164" width="3" height="70" rx="1.5" fill="#3b82f6"/>
    <circle cx="25" cy="184" r="4" fill="#3b82f6"/>
    <text x="37" y="188" font-family="'Plus Jakarta Sans',sans-serif" font-size="14" fill="#ffffff" font-weight="600">Equalizer</text>
    <text x="37" y="206" font-family="'Plus Jakarta Sans',sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">Bass · Mid · Treble</text>
    <g transform="translate(280, 184)">
      <rect x="0" y="0" width="160" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
      <rect x="40" y="0" width="80" height="4" rx="2" fill="#3b82f6"/>
      <circle cx="80" cy="2" r="5" fill="#3b82f6" stroke="#0c0c1a" stroke-width="2"/>
    </g>
    <text x="490" y="204" text-anchor="end" font-family="'Plus Jakarta Sans',sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">OFF</text>
    
    <!-- Chorus -->
    <rect x="0" y="246" width="530" height="70" rx="16" fill="url(#glass)" stroke="rgba(132,204,22,0.15)" stroke-width="0.5"/>
    <rect x="0" y="246" width="3" height="70" rx="1.5" fill="#84cc16"/>
    <circle cx="25" cy="266" r="4" fill="#84cc16"/>
    <text x="37" y="270" font-family="'Plus Jakarta Sans',sans-serif" font-size="14" fill="#ffffff" font-weight="600">Chorus</text>
    <text x="37" y="288" font-family="'Plus Jakarta Sans',sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">Rate · Depth · Mix</text>
    <g transform="translate(280, 266)">
      <rect x="0" y="0" width="160" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
      <rect x="0" y="0" width="50" height="4" rx="2" fill="#84cc16"/>
      <circle cx="50" cy="2" r="5" fill="#84cc16" stroke="#0c0c1a" stroke-width="2"/>
    </g>
    <text x="490" y="286" text-anchor="end" font-family="'Plus Jakarta Sans',sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">OFF</text>
    
    <!-- Noise Gate -->
    <rect x="0" y="328" width="530" height="70" rx="16" fill="url(#glass)" stroke="rgba(168,85,247,0.15)" stroke-width="0.5"/>
    <rect x="0" y="328" width="3" height="70" rx="1.5" fill="#a855f7"/>
    <circle cx="25" cy="348" r="4" fill="#a855f7"/>
    <text x="37" y="352" font-family="'Plus Jakarta Sans',sans-serif" font-size="14" fill="#ffffff" font-weight="600">Noise Gate</text>
    <text x="37" y="370" font-family="'Plus Jakarta Sans',sans-serif" font-size="11" fill="rgba(255,255,255,0.35)">Threshold · Attack · Release</text>
    <g transform="translate(280, 348)">
      <rect x="0" y="0" width="160" height="4" rx="2" fill="rgba(255,255,255,0.06)"/>
      <rect x="0" y="0" width="110" height="4" rx="2" fill="#a855f7"/>
      <circle cx="110" cy="2" r="5" fill="#a855f7" stroke="#0c0c1a" stroke-width="2"/>
    </g>
    <text x="490" y="368" text-anchor="end" font-family="'Plus Jakarta Sans',sans-serif" font-size="10" fill="rgba(168,85,247,0.8)">ON</text>
  </g>
  
  <!-- Bottom toolbar -->
  <rect x="35" y="1060" width="530" height="105" rx="24" fill="url(#glass)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <g transform="translate(55, 1075)">
    <rect x="0" y="0" width="90" height="75" rx="12" fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.2)" stroke-width="0.5"/>
    <text x="45" y="35" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="11" fill="#22d3ee" font-weight="500">Effects</text>
    <text x="45" y="55" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="8" fill="rgba(34,211,238,0.5)">chain</text>
    
    <rect x="100" y="0" width="90" height="75" rx="12" fill="url(#glass)"/>
    <text x="145" y="35" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Tuner</text>
    
    <rect x="200" y="0" width="90" height="75" rx="12" fill="url(#glass)"/>
    <text x="245" y="35" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Match</text>
    
    <rect x="300" y="0" width="90" height="75" rx="12" fill="url(#glass)"/>
    <text x="345" y="35" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">Transcribe</text>
    
    <rect x="400" y="0" width="90" height="75" rx="12" fill="url(#glass)"/>
    <text x="445" y="35" text-anchor="middle" font-family="'Plus Jakarta Sans',sans-serif" font-size="11" fill="rgba(255,255,255,0.5)">More</text>
  </g>
</svg>
