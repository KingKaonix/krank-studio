<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1200">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#1c1c2e"/>
      <stop offset="100%" style="stop-color:#0a0a12"/>
    </radialGradient>
    <linearGradient id="card-dist" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1520"/>
      <stop offset="100%" style="stop-color:#1a0e15"/>
    </linearGradient>
    <linearGradient id="card-sim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#142a24"/>
      <stop offset="100%" style="stop-color:#0e1e1a"/>
    </linearGradient>
    <linearGradient id="card-eq" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141e2a"/>
      <stop offset="100%" style="stop-color:#0e1520"/>
    </linearGradient>
    <linearGradient id="card-chorus" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a14"/>
      <stop offset="100%" style="stop-color:#121e0e"/>
    </linearGradient>
    <filter id="glow-cyan">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Phone body -->
  <rect x="20" y="20" width="560" height="1160" rx="48" fill="#08080f"/>
  <rect x="35" y="35" width="530" height="1130" rx="40" fill="url(#bg-glow)"/>
  
  <!-- Floating pill nav -->
  <rect x="120" y="50" width="360" height="40" rx="20" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <text x="300" y="75" text-anchor="middle" font-family="'Cabinet Grotesk',sans-serif" font-size="14" fill="#ffffff" font-weight="700" letter-spacing="-0.3">KRANK</text>
  <text x="300" y="75" text-anchor="middle" font-family="'Cabinet Grotesk',sans-serif" font-size="14" fill="#22d3ee" font-weight="300"></text>
  <text x="50" y="75" font-family="'Cabinet Grotesk',sans-serif" font-size="12" fill="rgba(255,255,255,0.5)">9:41</text>
  
  <!-- Hero area - bento grid -->
  <g transform="translate(35, 105)">
    <!-- Large card: VU + status -->
    <rect x="0" y="0" width="340" height="120" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    <text x="20" y="28" font-family="'Cabinet Grotesk',sans-serif" font-size="11" fill="rgba(255,255,255,0.4)" letter-spacing="2">INPUT LEVEL</text>
    <g transform="translate(20, 40)">
      <rect x="0" y="0" width="280" height="8" rx="4" fill="rgba(255,255,255,0.04)"/>
      <rect x="0" y="0" width="180" height="8" rx="4" fill="#22d3ee"/>
    </g>
    <text x="20" y="75" font-family="'Cabinet Grotesk',sans-serif" font-size="28" fill="#ffffff" font-weight="700">-6.2 dB</text>
    <text x="280" y="75" font-family="'Cabinet Grotesk',sans-serif" font-size="11" fill="rgba(255,255,255,0.3)">PEAK</text>
    <rect x="20" y="90" width="60" height="20" rx="10" fill="rgba(34,211,238,0.15)"/>
    <text x="50" y="103" text-anchor="middle" font-family="'Cabinet Grotesk',sans-serif" font-size="9" fill="#22d3ee">LIVE</text>
    <rect x="90" y="90" width="60" height="20" rx="10" fill="rgba(255,255,255,0.04)"/>
    <text x="120" y="103" text-anchor="middle" font-family="'Cabinet Grotesk',sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">48kHz</text>
    
    <!-- Small card: preset -->
    <rect x="352" y="0" width="178" height="55" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    <text x="370" y="22" font-family="'Cabinet Grotesk',sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" letter-spacing="1">CURRENT PRESET</text>
    <text x="370" y="42" font-family="'Cabinet Grotesk',sans-serif" font-size="13" fill="#22d3ee" font-weight="600">METAL_04</text>
    
    <!-- Small card: latency -->
    <rect x="352" y="65" width="178" height="55" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
    <text x="370" y="87" font-family="'Cabinet Grotesk',sans-serif" font-size="9" fill="rgba(255,255,255,0.4)" letter-spacing="1">LATENCY</text>
    <text x="370" y="107" font-family="'Cabinet Grotesk',sans-serif" font-size="13" fill="#22c55e" font-weight="600">2.7 ms</text>
  </g>
  
  <!-- Effects chain - gapless bento style -->
  <g transform="translate(35, 240)">
    <!-- Row 1: Distortion + Amp Sim -->
    <rect x="0" y="0" width="260" height="100" rx="16" fill="url(#card-dist)" stroke="rgba(239,68,68,0.15)" stroke-width="1"/>
    <circle cx="20" cy="20" r="5" fill="#ef4444" filter="url(#glow-cyan)"/>
    <text x="34" y="24" font-family="'Cabinet Grotesk',sans-serif" font-size="16" fill="#ffffff" font-weight="600">Distortion</text>
    <text x="34" y="42" font-family="'Cabinet Grotesk',sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Drive 72 · Tone 54 · Level 81</text>
    <g transform="translate(20, 55)">
      <rect x="0" y="0" width="220" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
      <rect x="0" y="0" width="160" height="3" rx="1.5" fill="#ef4444"/>
    </g>
    <rect x="20" y="70" width="80" height="20" rx="8" fill="rgba(239,68,68,0.15)"/>
    <text x="60" y="83" text-anchor="middle" font-family="'Cabinet Grotesk',sans-serif" font-size="9" fill="#ef4444">ACTIVE</text>
    
    <rect x="272" y="0" width="258" height="100" rx="16" fill="url(#card-sim)" stroke="rgba(20,184,166,0.15)" stroke-width="1"/>
    <circle cx="292" cy="20" r="5" fill="#14b8a6"/>
    <text x="306" y="24" font-family="'Cabinet Grotesk',sans-serif" font-size="16" fill="#ffffff" font-weight="600">Amp Sim</text>
    <text x="306" y="42" font-family="'Cabinet Grotesk',sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Drive 45 · Tone 78 · Level 62</text>
    <g transform="translate(292, 55)">
      <rect x="0" y="0" width="220" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
      <rect x="0" y="0" width="180" height="3" rx="1.5" fill="#14b8a6"/>
    </g>
    <rect x="292" y="70" width="80" height="20" rx="8" fill="rgba(20,184,166,0.15)"/>
    <text x="332" y="83" text-anchor="middle" font-family="'Cabinet Grotesk',sans-serif" font-size="9" fill="#14b8a6">ACTIVE</text>
    
    <!-- Row 2: EQ + Chorus -->
    <rect x="0" y="110" width="260" height="100" rx="16" fill="url(#card-eq)" stroke="rgba(59,130,246,0.15)" stroke-width="1"/>
    <circle cx="20" cy="130" r="5" fill="#3b82f6"/>
    <text x="34" y="134" font-family="'Cabinet Grotesk',sans-serif" font-size="16" fill="#ffffff" font-weight="600">EQ</text>
    <text x="34" y="152" font-family="'Cabinet Grotesk',sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Bass 38 · Mid 52 · Treble 67</text>
    <g transform="translate(20, 165)">
      <rect x="0" y="0" width="220" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
      <rect x="40" y="0" width="140" height="3" rx="1.5" fill="#3b82f6"/>
    </g>
    <rect x="20" y="180" width="80" height="20" rx="8" fill="rgba(255,255,255,0.04)"/>
    <text x="60" y="193" text-anchor="middle" font-family="'Cabinet Grotesk',sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">BYPASS</text>
    
    <rect x="272" y="110" width="258" height="100" rx="16" fill="url(#card-chorus)" stroke="rgba(132,204,22,0.15)" stroke-width="1"/>
    <circle cx="292" cy="130" r="5" fill="#84cc16"/>
    <text x="306" y="134" font-family="'Cabinet Grotesk',sans-serif" font-size="16" fill="#ffffff" font-weight="600">Chorus</text>
    <text x="306" y="152" font-family="'Cabinet Grotesk',sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Rate 22 · Depth 45 · Mix 38</text>
    <g transform="translate(292, 165)">
      <rect x="0" y="0" width="220" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
      <rect x="0" y="0" width="60" height="3" rx="1.5" fill="#84cc16"/>
    </g>
    <rect x="292" y="180" width="80" height="20" rx="8" fill="rgba(255,255,255,0.04)"/>
    <text x="332" y="193" text-anchor="middle" font-family="'Cabinet Grotesk',sans-serif" font-size="9" fill="rgba(255,255,255,0.3)">BYPASS</text>
    
    <!-- Row 3: Spanning card for Noise Gate -->
    <rect x="0" y="220" width="530" height="80" rx="16" fill="rgba(168,85,247,0.04)" stroke="rgba(168,85,247,0.12)" stroke-width="1"/>
    <circle cx="20" cy="240" r="5" fill="#a855f7"/>
    <text x="34" y="244" font-family="'Cabinet Grotesk',sans-serif" font-size="16" fill="#ffffff" font-weight="600">Noise Gate</text>
    <text x="34" y="264" font-family="'Cabinet Grotesk',sans-serif" font-size="9" fill="rgba(255,255,255,0.35)">Threshold · Attack · Release</text>
    <g transform="translate(300, 240)">
      <rect x="0" y="0" width="200" height="3" rx="1.5" fill="rgba(255,255,255,0.06)"/>
      <rect x="0" y="0" width="140" height="3" rx="1.5" fill="#a855f7"/>
    </g>
    <rect x="300" y="258" width="80" height="20" rx="8" fill="rgba(168,85,247,0.15)"/>
    <text x="340" y="271" text-anchor="middle" font-family="'Cabinet Grotesk',sans-serif" font-size="9" fill="#a855f7">ACTIVE</text>
  </g>
  
  <!-- Tuner compact -->
  <g transform="translate(35, 560)">
    <rect x="0" y="0" width="530" height="70" rx="16" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    <text x="260" y="25" text-anchor="middle" font-family="'Cabinet Grotesk',sans-serif" font-size="28" fill="#ffffff" font-weight="700">A</text>
    <text x="320" y="25" font-family="'Cabinet Grotesk',sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">440.0 Hz</text>
    <rect x="260" y="40" width="200" height="3" rx="1.5" fill="rgba(255,255,255,0.04)"/>
    <rect x="350" y="40" width="20" height="3" rx="1.5" fill="#22c55e"/>
    <text x="20" y="25" font-family="'Cabinet Grotesk',sans-serif" font-size="9" fill="rgba(255,255,255,0.3)" letter-spacing="1">TUNER</text>
  </g>
  
  <!-- Bottom nav - pill style -->
  <rect x="35" y="1070" width="530" height="95" rx="24" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.04)" stroke-width="0.5"/>
  <g transform="translate(55, 1085)">
    <circle cx="30" cy="20" r="3" fill="#22d3ee"/>
    <text x="30" y="48" text-anchor="middle" font-family="'Cabinet Grotesk',sans-serif" font-size="10" fill="#22d3ee" font-weight="500">FX</text>
    
    <circle cx="135" cy="20" r="3" fill="rgba(255,255,255,0.15)"/>
    <text x="135" y="48" text-anchor="middle" font-family="'Cabinet Grotesk',sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">TUNE</text>
    
    <circle cx="240" cy="20" r="3" fill="rgba(255,255,255,0.15)"/>
    <text x="240" y="48" text-anchor="middle" font-family="'Cabinet Grotesk',sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">MATCH</text>
    
    <circle cx="345" cy="20" r="3" fill="rgba(255,255,255,0.15)"/>
    <text x="345" y="48" text-anchor="middle" font-family="'Cabinet Grotesk',sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">TRANS</text>
    
    <circle cx="450" cy="20" r="3" fill="rgba(255,255,255,0.15)"/>
    <text x="450" y="48" text-anchor="middle" font-family="'Cabinet Grotesk',sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">MORE</text>
  </g>
</svg>
