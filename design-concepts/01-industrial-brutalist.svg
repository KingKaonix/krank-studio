<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1200">
  <defs>
    <filter id="cr">
      <feComponentTransfer><feFuncR type="linear" slope="1.2"/><feFuncG type="linear" slope="0.9"/><feFuncB type="linear" slope="0.8"/></feComponentTransfer>
    </filter>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="1" fill="rgba(0,0,0,0.08)"/>
    </pattern>
  </defs>
  <!-- CRT body -->
  <rect x="20" y="20" width="560" height="1160" rx="48" fill="#0a0a0b" stroke="#1a1a1e" stroke-width="2"/>
  <rect x="35" y="35" width="530" height="1130" rx="40" fill="#0d0d0f"/>
  <rect x="35" y="35" width="530" height="1130" rx="40" fill="url(#scanlines)"/>
  
  <!-- Top bar -->
  <rect x="35" y="35" width="530" height="60" fill="#111113"/>
  <text x="50" y="72" font-family="'Courier New',monospace" font-size="13" fill="#22d3ee" font-weight="bold" letter-spacing="3">KRANK_STUDIO v1.7.0</text>
  <text x="530" y="72" text-anchor="end" font-family="monospace" font-size="10" fill="#555">09:41</text>
  <line x1="35" y1="95" x2="565" y2="95" stroke="#22d3ee" stroke-width="0.5" opacity="0.3"/>
  
  <!-- System status line -->
  <text x="50" y="112" font-family="monospace" font-size="9" fill="#555">SYS:ONLINE  BUF:256  SR:48kHz  TEMP:42C</text>
  <text x="530" y="112" text-anchor="end" font-family="monospace" font-size="9" fill="#22d3ee">RT:2.7ms</text>
  
  <!-- VU Meter - tactical style -->
  <rect x="50" y="125" width="500" height="32" rx="2" fill="#0a0a0b" stroke="#1a1a1e" stroke-width="1"/>
  <text x="55" y="145" font-family="monospace" font-size="8" fill="#555">IN</text>
  <rect x="80" y="130" width="8" height="22" rx="1" fill="#22c55e" opacity="0.9"/>
  <rect x="92" y="130" width="8" height="22" rx="1" fill="#22c55e" opacity="0.8"/>
  <rect x="104" y="130" width="8" height="22" rx="1" fill="#22c55e" opacity="0.7"/>
  <rect x="116" y="130" width="8" height="22" rx="1" fill="#eab308" opacity="0.6"/>
  <rect x="128" y="130" width="8" height="22" rx="1" fill="#eab308" opacity="0.4"/>
  <rect x="140" y="130" width="8" height="22" rx="1" fill="#ef4444" opacity="0.2"/>
  <text x="160" y="145" font-family="monospace" font-size="8" fill="#555">-12dB</text>
  <text x="500" y="145" text-anchor="end" font-family="monospace" font-size="8" fill="#555">PEAK: -6.2dB</text>
  
  <!-- Effect cards - brutalist style -->
  <g transform="translate(50,170)">
    <!-- Distortion -->
    <rect x="0" y="0" width="500" height="56" rx="0" fill="#111113" stroke="#222" stroke-width="1"/>
    <rect x="0" y="0" width="3" height="56" fill="#ef4444"/>
    <text x="12" y="20" font-family="'Courier New',monospace" font-size="9" fill="#ef4444" font-weight="bold">[01]</text>
    <text x="40" y="20" font-family="monospace" font-size="11" fill="#ccc" font-weight="bold">DISTORTION</text>
    <text x="40" y="38" font-family="monospace" font-size="8" fill="#555">DRV:72  TON:54  LVL:81</text>
    <rect x="220" y="12" width="180" height="2" fill="#222"/>
    <rect x="220" y="12" width="130" height="2" fill="#ef4444"/>
    <rect x="310" y="18" width="100" height="20" rx="2" fill="none" stroke="#ef4444" stroke-width="1"/>
    <text x="360" y="32" text-anchor="middle" font-family="monospace" font-size="9" fill="#ef4444">ACTIVE</text>
    
    <!-- Amp Sim -->
    <rect x="0" y="60" width="500" height="48" rx="0" fill="#0d0d0f" stroke="#1a1a1e" stroke-width="1"/>
    <rect x="0" y="60" width="3" height="48" fill="#14b8a6"/>
    <text x="12" y="80" font-family="'Courier New',monospace" font-size="9" fill="#14b8a6">[02]</text>
    <text x="40" y="80" font-family="monospace" font-size="11" fill="#ccc" font-weight="bold">AMP_SIM</text>
    <text x="40" y="96" font-family="monospace" font-size="8" fill="#555">DRV:45  TON:78  LVL:62</text>
    <rect x="220" y="72" width="180" height="2" fill="#222"/>
    <rect x="220" y="72" width="100" height="2" fill="#14b8a6"/>
    <rect x="310" y="78" width="100" height="20" rx="2" fill="none" stroke="#14b8a6" stroke-width="1"/>
    <text x="360" y="92" text-anchor="middle" font-family="monospace" font-size="9" fill="#14b8a6">ACTIVE</text>
    
    <!-- EQ -->
    <rect x="0" y="112" width="500" height="48" rx="0" fill="#111113" stroke="#222" stroke-width="1"/>
    <rect x="0" y="112" width="3" height="48" fill="#3b82f6"/>
    <text x="12" y="132" font-family="'Courier New',monospace" font-size="9" fill="#3b82f6">[03]</text>
    <text x="40" y="132" font-family="monospace" font-size="11" fill="#ccc" font-weight="bold">EQ</text>
    <text x="40" y="148" font-family="monospace" font-size="8" fill="#555">BASS:38  MID:52  TRB:67</text>
    <rect x="220" y="124" width="180" height="2" fill="#222"/>
    <rect x="220" y="124" width="80" height="2" fill="#3b82f6"/>
    <rect x="310" y="130" width="100" height="20" rx="2" fill="none" stroke="#333" stroke-width="1"/>
    <text x="360" y="144" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">BYPASS</text>
    
    <!-- Chorus -->
    <rect x="0" y="164" width="500" height="48" rx="0" fill="#0d0d0f" stroke="#1a1a1e" stroke-width="1"/>
    <rect x="0" y="164" width="3" height="48" fill="#84cc16"/>
    <text x="12" y="184" font-family="'Courier New',monospace" font-size="9" fill="#84cc16">[04]</text>
    <text x="40" y="184" font-family="monospace" font-size="11" fill="#ccc" font-weight="bold">CHORUS</text>
    <text x="40" y="200" font-family="monospace" font-size="8" fill="#555">RATE:22  DPT:45  MIX:38</text>
    <rect x="220" y="176" width="180" height="2" fill="#222"/>
    <rect x="220" y="176" width="60" height="2" fill="#84cc16"/>
    <rect x="310" y="182" width="100" height="20" rx="2" fill="none" stroke="#333" stroke-width="1"/>
    <text x="360" y="196" text-anchor="middle" font-family="monospace" font-size="9" fill="#555">BYPASS</text>
  </g>
  
  <!-- Preset indicator -->
  <rect x="50" y="460" width="500" height="36" fill="#111113" stroke="#1a1a1e" stroke-width="1"/>
  <text x="60" y="483" font-family="monospace" font-size="9" fill="#555">PRESET:</text>
  <rect x="140" y="463" width="120" height="30" fill="#0a0a0b" stroke="#22d3ee" stroke-width="1"/>
  <text x="200" y="483" text-anchor="middle" font-family="monospace" font-size="10" fill="#22d3ee">METAL_04</text>
  <text x="380" y="483" font-family="monospace" font-size="9" fill="#555">REC:OFF  MON:ON</text>
  
  <!-- Tuner display -->
  <rect x="50" y="510" width="500" height="100" rx="0" fill="#0d0d0f" stroke="#1a1a1e" stroke-width="1"/>
  <text x="60" y="530" font-family="monospace" font-size="8" fill="#555">CHROMATIC_TUNER: STANDARD (EADGBE)</text>
  <text x="300" y="565" text-anchor="middle" font-family="'Courier New',monospace" font-size="48" fill="#22d3ee" font-weight="bold">A</text>
  <text x="300" y="585" text-anchor="middle" font-family="monospace" font-size="10" fill="#555">440.0 Hz  -0.2¢</text>
  <line x1="200" y1="595" x2="400" y2="595" stroke="#222" stroke-width="2"/>
  <line x1="295" y1="593" x2="305" y2="593" stroke="#22c55e" stroke-width="3"/>
  
  <!-- Bottom nav - tactical -->
  <rect x="35" y="1065" width="530" height="100" fill="#0a0a0b" stroke="#1a1a1e" stroke-width="1"/>
  <g transform="translate(50,1075)">
    <rect x="0" y="0" width="96" height="80" rx="0" fill="#111113" stroke="#22d3ee" stroke-width="1"/>
    <text x="48" y="35" text-anchor="middle" font-family="monospace" font-size="10" fill="#22d3ee">[FX]</text>
    <text x="48" y="55" text-anchor="middle" font-family="monospace" font-size="8" fill="#22d3ee">EFFECTS</text>
    
    <rect x="104" y="0" width="96" height="80" rx="0" fill="#0d0d0f" stroke="#1a1a1e" stroke-width="1"/>
    <text x="152" y="35" text-anchor="middle" font-family="monospace" font-size="10" fill="#555">[TN]</text>
    <text x="152" y="55" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">TUNER</text>
    
    <rect x="208" y="0" width="96" height="80" rx="0" fill="#0d0d0f" stroke="#1a1a1e" stroke-width="1"/>
    <text x="256" y="35" text-anchor="middle" font-family="monospace" font-size="10" fill="#555">[MT]</text>
    <text x="256" y="55" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">MATCH</text>
    
    <rect x="312" y="0" width="96" height="80" rx="0" fill="#0d0d0f" stroke="#1a1a1e" stroke-width="1"/>
    <text x="360" y="35" text-anchor="middle" font-family="monospace" font-size="10" fill="#555">[TR]</text>
    <text x="360" y="55" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">TRANS</text>
    
    <rect x="416" y="0" width="96" height="80" rx="0" fill="#0d0d0f" stroke="#1a1a1e" stroke-width="1"/>
    <text x="464" y="35" text-anchor="middle" font-family="monospace" font-size="10" fill="#555">[TL]</text>
    <text x="464" y="55" text-anchor="middle" font-family="monospace" font-size="8" fill="#555">TOOLS</text>
  </g>
  
  <!-- Terminal cursor blink -->
  <rect x="50" y="620" width="500" height="1" fill="#22d3ee" opacity="0.5"/>
  <text x="55" y="638" font-family="monospace" font-size="8" fill="#22d3ee">► KRANK_READY  |  PRESS [MENU] FOR COMMANDS</text>
</svg>
