<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 1200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafbfc"/>
      <stop offset="100%" style="stop-color:#f0f2f5"/>
    </linearGradient>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#fafafa"/>
    </linearGradient>
  </defs>
  
  <!-- Phone body -->
  <rect x="20" y="20" width="560" height="1160" rx="48" fill="#e8eaed" stroke="#d0d4dc" stroke-width="1"/>
  <rect x="35" y="35" width="530" height="1130" rx="40" fill="url(#bg)"/>
  
  <!-- Subtle top gradient -->
  <rect x="35" y="35" width="530" height="200" rx="40" fill="rgba(255,255,255,0.5)"/>
  
  <!-- Status bar -->
  <text x="50" y="68" font-family="'Inter',sans-serif" font-size="12" fill="#1a1a2e" font-weight="500">9:41</text>
  <circle cx="530" cy="64" r="3" fill="#555"/>
  
  <!-- App header -->
  <text x="50" y="120" font-family="'Inter',sans-serif" font-size="26" fill="#0a0a0a" font-weight="300" letter-spacing="-0.5">krank</text>
  <text x="50" y="142" font-family="'Inter',sans-serif" font-size="11" fill="#888" font-weight="400" letter-spacing="2">STUDIO</text>
  
  <!-- VU Meter - minimal -->
  <rect x="50" y="170" width="500" height="32" rx="8" fill="rgba(0,0,0,0.03)"/>
  <text x="65" y="190" font-family="'Inter',sans-serif" font-size="9" fill="#aaa" letter-spacing="0.5">Input Level</text>
  <g transform="translate(160, 175)">
    <rect x="0" y="4" width="200" height="16" rx="8" fill="rgba(0,0,0,0.04)"/>
    <rect x="2" y="6" width="28" height="12" rx="6" fill="#22c55e" opacity="0.8"/>
    <rect x="32" y="6" width="28" height="12" rx="6" fill="#22c55e" opacity="0.6"/>
    <rect x="62" y="6" width="28" height="12" rx="6" fill="#eab308" opacity="0.5"/>
    <rect x="92" y="6" width="28" height="12" rx="6" fill="#eab308" opacity="0.3"/>
    <rect x="122" y="6" width="28" height="12" rx="6" fill="#ef4444" opacity="0.15"/>
    <rect x="152" y="6" width="28" height="12" rx="6" fill="#ef4444" opacity="0.08"/>
  </g>
  <text x="490" y="190" text-anchor="end" font-family="'Inter',sans-serif" font-size="9" fill="#bbb">-6 dB</text>
  
  <!-- Effect cards - minimal editorial style -->
  <g transform="translate(50, 220)">
    <!-- Distortion -->
    <rect x="0" y="0" width="500" height="64" rx="12" fill="url(#card-bg)" stroke="rgba(0,0,0,0.04)" stroke-width="1" filter="drop-shadow(0 1px 2px rgba(0,0,0,0.02))"/>
    <text x="20" y="28" font-family="'Inter',sans-serif" font-size="14" fill="#1a1a1a" font-weight="500">Distortion</text>
    <text x="20" y="46" font-family="'Inter',sans-serif" font-size="10" fill="#999">Drive 72 · Tone 54 · Level 81</text>
    <g transform="translate(260, 14)">
      <rect x="0" y="0" width="160" height="3" rx="1.5" fill="#eee"/>
      <rect x="0" y="0" width="110" height="3" rx="1.5" fill="#ef4444"/>
    </g>
    <text x="470" y="28" text-anchor="end" font-family="'Inter',sans-serif" font-size="10" fill="#ef4444" font-weight="500">On</text>
    
    <!-- Amp Sim -->
    <rect x="0" y="72" width="500" height="56" rx="12" fill="url(#card-bg)" stroke="rgba(0,0,0,0.04)" stroke-width="1"/>
    <text x="20" y="94" font-family="'Inter',sans-serif" font-size="14" fill="#1a1a1a" font-weight="500">Amp Sim</text>
    <text x="20" y="112" font-family="'Inter',sans-serif" font-size="10" fill="#999">Drive 45 · Tone 78 · Level 62</text>
    <g transform="translate(260, 80)">
      <rect x="0" y="0" width="160" height="3" rx="1.5" fill="#eee"/>
      <rect x="0" y="0" width="90" height="3" rx="1.5" fill="#14b8a6"/>
    </g>
    <text x="470" y="94" text-anchor="end" font-family="'Inter',sans-serif" font-size="10" fill="#14b8a6" font-weight="500">On</text>
    
    <!-- EQ -->
    <rect x="0" y="136" width="500" height="56" rx="12" fill="url(#card-bg)" stroke="rgba(0,0,0,0.04)" stroke-width="1"/>
    <text x="20" y="158" font-family="'Inter',sans-serif" font-size="14" fill="#1a1a1a" font-weight="500">Equalizer</text>
    <text x="20" y="176" font-family="'Inter',sans-serif" font-size="10" fill="#999">Bass 38 · Mid 52 · Treble 67</text>
    <g transform="translate(260, 144)">
      <rect x="0" y="0" width="160" height="3" rx="1.5" fill="#eee"/>
      <rect x="30" y="0" width="90" height="3" rx="1.5" fill="#3b82f6"/>
    </g>
    <text x="470" y="158" text-anchor="end" font-family="'Inter',sans-serif" font-size="10" fill="#bbb">Off</text>
    
    <!-- Chorus -->
    <rect x="0" y="200" width="500" height="56" rx="12" fill="url(#card-bg)" stroke="rgba(0,0,0,0.04)" stroke-width="1"/>
    <text x="20" y="222" font-family="'Inter',sans-serif" font-size="14" fill="#1a1a1a" font-weight="500">Chorus</text>
    <text x="20" y="240" font-family="'Inter',sans-serif" font-size="10" fill="#999">Rate 22 · Depth 45 · Mix 38</text>
    <g transform="translate(260, 208)">
      <rect x="0" y="0" width="160" height="3" rx="1.5" fill="#eee"/>
      <rect x="0" y="0" width="40" height="3" rx="1.5" fill="#84cc16"/>
    </g>
    <text x="470" y="222" text-anchor="end" font-family="'Inter',sans-serif" font-size="10" fill="#bbb">Off</text>
    
    <!-- Noise Gate -->
    <rect x="0" y="264" width="500" height="56" rx="12" fill="url(#card-bg)" stroke="rgba(0,0,0,0.04)" stroke-width="1"/>
    <text x="20" y="286" font-family="'Inter',sans-serif" font-size="14" fill="#1a1a1a" font-weight="500">Noise Gate</text>
    <text x="20" y="304" font-family="'Inter',sans-serif" font-size="10" fill="#999">Threshold · Attack · Release</text>
    <g transform="translate(260, 272)">
      <rect x="0" y="0" width="160" height="3" rx="1.5" fill="#eee"/>
      <rect x="0" y="0" width="120" height="3" rx="1.5" fill="#a855f7"/>
    </g>
    <text x="470" y="286" text-anchor="end" font-family="'Inter',sans-serif" font-size="10" fill="#a855f7" font-weight="500">On</text>
  </g>
  
  <!-- Divider -->
  <line x1="50" y1="560" x2="550" y2="560" stroke="#e0e0e0" stroke-width="1"/>
  
  <!-- Tuner - minimal -->
  <text x="50" y="590" font-family="'Inter',sans-serif" font-size="9" fill="#bbb" letter-spacing="1.5">TUNER</text>
  <text x="300" y="640" text-anchor="middle" font-family="'Inter',sans-serif" font-size="64" fill="#1a1a1a" font-weight="300">A</text>
  <text x="300" y="665" text-anchor="middle" font-family="'Inter',sans-serif" font-size="11" fill="#999">440.0 Hz</text>
  <rect x="200" y="675" width="200" height="3" rx="1.5" fill="#eee"/>
  <rect x="290" y="675" width="20" height="3" rx="1.5" fill="#22c55e"/>
  
  <!-- Bottom nav - minimal -->
  <rect x="35" y="1065" width="530" height="100" fill="#ffffff" rx="20" stroke="rgba(0,0,0,0.03)" stroke-width="1"/>
  <g transform="translate(50, 1075)">
    <rect x="0" y="0" width="96" height="80" rx="8" fill="#f5f5f5"/>
    <text x="48" y="38" text-anchor="middle" font-family="'Inter',sans-serif" font-size="10" fill="#1a1a1a" font-weight="500">Effects</text>
    <text x="48" y="58" text-anchor="middle" font-family="'Inter',sans-serif" font-size="8" fill="#bbb">4 active</text>
    
    <rect x="104" y="0" width="96" height="80" rx="8" fill="none"/>
    <text x="152" y="38" text-anchor="middle" font-family="'Inter',sans-serif" font-size="10" fill="#aaa">Tuner</text>
    
    <rect x="208" y="0" width="96" height="80" rx="8" fill="none"/>
    <text x="256" y="38" text-anchor="middle" font-family="'Inter',sans-serif" font-size="10" fill="#aaa">Match</text>
    
    <rect x="312" y="0" width="96" height="80" rx="8" fill="none"/>
    <text x="360" y="38" text-anchor="middle" font-family="'Inter',sans-serif" font-size="10" fill="#aaa">Transcribe</text>
    
    <rect x="416" y="0" width="96" height="80" rx="8" fill="none"/>
    <text x="464" y="38" text-anchor="middle" font-family="'Inter',sans-serif" font-size="10" fill="#aaa">Tools</text>
  </g>
</svg>
