name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973" > /dev/null
          echo "NDK 27.0.12077973 installed"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Update app version
        run: |
          sed -i "s/versionCode = 1/versionCode = ${{ github.run_number }}/" app/build.gradle.kts
          sed -i "s/versionName = \"0.1.0\"/versionName = \"${{ steps.version.outputs.VERSION }}\"/" app/build.gradle.kts

      - name: Build Release APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/krank-v${{ steps.version.outputs.VERSION }}.apk

      - name: Generate release notes
        id: notes
        run: |
          if [ -f CHANGELOG.md ]; then
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            cat CHANGELOG.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Guitarix v${{ steps.version.outputs.VERSION }}
          body: ${{ steps.notes.outputs.notes }}
          fail_on_unmatched_files: true
          files: |
            app/build/outputs/apk/debug/krank-v*.apk
