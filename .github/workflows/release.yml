name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973" > /dev/null
          echo "NDK 27.0.12077973 installed"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Update app version
        run: |
          # Read current versionCode and versionName from version.properties
          VERSION_CODE=$(grep versionCode version.properties | cut -d= -f2)
          VERSION_NAME=$(grep versionName version.properties | cut -d= -f2)

          # Increment versionCode
          NEW_VERSION_CODE=$((VERSION_CODE + 1))

          # Update versionCode in build.gradle.kts
          sed -i "s/versionCode = [0-9]*/versionCode = $NEW_VERSION_CODE/" app/build.gradle.kts

          # Update versionName in build.gradle.kts
          sed -i "s/versionName = \"[0-9.]\+\"/versionName = \"$VERSION_NAME\"/" app/build.gradle.kts

          # Update version.properties with new versionCode
          sed -i "s/versionCode = [0-9]*/versionCode = $NEW_VERSION_CODE/" version.properties

          # Print version update
          echo "Updated versionCode from $VERSION_CODE to $NEW_VERSION_CODE"
          echo "Updated versionName to $VERSION_NAME"

      - name: Build Release APK
        timeout-minutes: 10
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/krank-v${{ steps.version.outputs.VERSION }}.apk

      - name: Generate release notes
        id: notes
        run: |
          if [ -f CHANGELOG.md ]; then
            echo "notes<<EOF" >> $GITHUB_OUTPUT
            cat CHANGELOG.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: KRANK STUDIO ${{ steps.version.outputs.VERSION }}
          body: ${{ steps.notes.outputs.notes }}
          fail_on_unmatched_files: true
          files: |
            app/build/outputs/apk/debug/krank-v${{ steps.version.outputs.VERSION }}.apk
